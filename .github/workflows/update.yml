name: Update AI Feed Data

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # manual trigger from GitHub Actions tab

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r fetcher/requirements.txt

      - name: Fetch feeds and generate data.json
        run: python fetcher/update.py

      - name: Commit updated data.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: auto-update feed data [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

      - name: Prepare deploy folder
        run: |
          mkdir -p /tmp/signal-deploy
          cp ai-pulse.html /tmp/signal-deploy/
          cp index.html    /tmp/signal-deploy/
          cp data.json     /tmp/signal-deploy/

      - name: Install Surge CLI
        run: npm install -g surge

      - name: Deploy to Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: surge /tmp/signal-deploy signal-ai-pulse.surge.sh
